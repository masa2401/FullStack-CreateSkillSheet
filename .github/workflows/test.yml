name: Fullstack Automated Tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          # フロントエンド用のpackage-lock.jsonの場所を指定
          cache-dependency-path: './vue-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./vue-frontend # フロントエンドのディレクトリで実行

      - name: Run Frontend tests
        run: npm run test:unit
        working-directory: ./vue-frontend

  backend-test:
    runs-on: ubuntu-latest

    # 1. サービスコンテナとしてPostgreSQLを起動
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Backend tests (Maven)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpassword
        run: mvn test
        working-directory: ./spring-backend
