name: Build and Deploy Backend to Railway

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. GitHub Container Registry (GHCR) へのログイン
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. DockerイメージのビルドとPush
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./spring-backend
          file: ./spring-backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend:latest

      # 3. Railway CLIのセットアップ
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # 4. Railwayへのデプロイ実行
      - name: Deploy to Railway
        run: railway deploy --image ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend:latest --service ${{ secrets.RAILWAY_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
