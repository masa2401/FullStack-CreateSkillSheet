name: Build and Deploy Backend to Railway

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ユーザー名とリポジトリ名を小文字に変換して環境変数（IMAGE_NAME）に格納
      - name: Downcase repository name
        run: |
          echo "IMAGE_NAME=$(echo 'ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 1. GitHub Container Registry (GHCR) へのログイン
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. DockerイメージのビルドとPush
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./spring-backend
          file: ./spring-backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      # 3. Railway CLIのセットアップ
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # 4. Railwayへのデプロイ実行
      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
