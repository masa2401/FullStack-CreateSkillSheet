name: Build and Deploy Backend to Railway

on:
  workflow_run:
    workflows: ['Fullstack Automated Tests']
    types: [completed]
    branches: [main]

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ユーザー名とリポジトリ名を小文字に変換して環境変数（IMAGE_NAME）に格納
      - name: Downcase repository name
        run: |
          echo "IMAGE_NAME=$(echo 'ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 1. GitHub Container Registry (GHCR) へのログイン
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. DockerイメージのビルドとPush
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./spring-backend
          file: ./spring-backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      # 3. Railway CLIのセットアップ
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # 4. Railwayへのデプロイ実行
      - name: Deploy to Railway
        run: railway redeploy --service ${{ secrets.RAILWAY_SERVICE_NAME }} -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
