services:
  # 1. データベース (PostgreSQL)
  db:
    image: postgres:18.4-alpine
    container_name: app_db
    environment:
      POSTGRES_DB: myapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - '5432:5432'
    # Railway（本番）に合わせたリソース制限コマンド
    command:
      [
        'postgres',
        '-c',
        'shared_buffers=64MB',
        '-c',
        'max_connections=20',
        '-c',
        'work_mem=2MB',
        '-c',
        'maintenance_work_mem=16MB',
      ]
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. バックエンド (Spring Boot)
  backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile.dev # 開発用のDockerfileを指定
    container_name: app_backend
    ports:
      - '8080:8080'
    env_file:
      - .env
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - FRONTEND_BASE_URL=https://full-stack-create-skill-sheet.vercel.app
    deploy:
      resources:
        limits:
          memory: 768M
    volumes:
      - ./spring-backend:/app
      - backend_target:/app/target/ # コンテナ内のビルド成果物をローカルに逆流させない
      - ~/.m2:/root/.m2 # Mavenのライブラリキャッシュを保持
    depends_on:
      db:
        condition: service_healthy # DBの起動（Healthcheck）が成功してから起動

  # 3. フロントエンド (Vue)
  frontend:
    build:
      context: ./vue-frontend
      dockerfile: Dockerfile
    container_name: app_frontend
    ports:
      - '5173:5173'
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./vue-frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # ホットリロードが検知されない場合の対策
    depends_on:
      - backend

# データの永続化用ボリューム
volumes:
  pgdata:
  backend_target:
  frontend_node_modules:
