# サーバー設定
server.port=${PORT:8080}
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# データベース設定
# Railway環境変数（SPRING_DATASOURCE_URL等）があればそれを使い、なければローカルDockerの「db」コンテナに接続する
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/myapp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres_password}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA/Hibernate設定
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# SQLログ出力（本番ではfalse、ローカルではtrueになるよう環境変数で上書き可能に）
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.auto_quote_keyword=true

sheet.expiry.days=5

# AWS PDF生成連携
aws.region=ap-northeast-1
aws.lambda.pdf-function-name=skillsheet-pdf-generator
aws.s3.pdf-bucket-name=skillsheet-pdf-masa2401
app.frontend-base-url=${FRONTEND_BASE_URL:https://full-stack-create-skill-sheet.vercel.app}